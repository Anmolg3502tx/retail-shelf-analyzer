<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anmol Gupta – Retail Shelf Analyzer</title>
<style>
  :root {
    --brand: #0f62fe;
    --brand-dark: #0043ce;
    --bg: #f4f4f4;
    --card: #ffffff;
    --text: #161616;
    --muted: #6f6f6f;
    --border: #e0e0e0;
    --success: #24a148;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', Arial, sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: #161616; color: #fff; padding: 16px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header span { font-size: 0.8rem; color: #a8a8a8; }

  main { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
  }
  h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--text); }

  /* Drop zone */
  #dropzone {
    border: 2px dashed var(--brand); border-radius: var(--radius);
    padding: 48px 24px; text-align: center; cursor: pointer;
    transition: background .2s;
  }
  #dropzone:hover, #dropzone.over { background: #eaf0ff; }
  #dropzone svg { display: block; margin: 0 auto 12px; }
  #dropzone p { color: var(--muted); font-size: 0.9rem; }
  #fileInput { display: none; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--brand); color: #fff; border: none;
    border-radius: var(--radius); padding: 10px 20px;
    font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn:disabled { background: #a8a8a8; cursor: default; }

  /* Preview */
  #preview-section { display: none; }
  #preview-img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); }

  /* Spinner */
  #spinner { display: none; text-align: center; padding: 32px; }
  .spin {
    width: 44px; height: 44px; border: 4px solid var(--border);
    border-top-color: var(--brand); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  #results-section { display: none; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg); border-radius: var(--radius);
    padding: 14px 16px; text-align: center;
  }
  .stat-card .val { font-size: 1.8rem; font-weight: 700; color: var(--brand); }
  .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media(max-width:700px){ .two-col { grid-template-columns: 1fr; } }

  #vis-img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); }

  /* Groups legend */
  #groups-legend { list-style: none; }
  #groups-legend li {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem;
  }
  .legend-swatch { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }

  /* JSON tab */
  #json-block {
    background: #1e1e1e; color: #d4d4d4;
    border-radius: var(--radius); padding: 16px;
    font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace;
    max-height: 340px; overflow-y: auto; white-space: pre;
  }

  .error-msg { color: #da1e28; background: #fff1f1; padding: 12px 16px; border-radius: var(--radius); }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="14" fill="#0f62fe"/>
    <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div>
    <h1>Anmol Gupta – Retail Shelf Analyzer</h1>
    <span>Product Detection + Brand Grouping Pipeline</span>
  </div>
</header>

<main>

  <!-- Upload card -->
  <div class="card">
    <h2>Upload Shelf Image</h2>
    <div id="dropzone" onclick="document.getElementById('fileInput').click()">
      <svg width="40" height="40" fill="none" stroke="#0f62fe" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0l-3 3m3-3l3 3"/>
      </svg>
      <p><strong>Click or drag &amp; drop</strong> a shelf image here</p>
      <p style="margin-top:4px">PNG, JPG, JPEG, WEBP (max 20 MB)</p>
    </div>
    <input type="file" id="fileInput" accept="image/*"/>

    <div id="preview-section" style="margin-top:16px;">
      <img id="preview-img" alt="Preview"/>
      <div style="margin-top:12px; display:flex; gap:10px; align-items:center;">
        <button class="btn" id="analyzeBtn" onclick="analyze()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          Analyze
        </button>
        <button class="btn" style="background:#6f6f6f" onclick="reset()">Clear</button>
      </div>
    </div>

    <div id="error-box" style="margin-top:12px;"></div>
  </div>

  <!-- Spinner -->
  <div id="spinner" class="card">
    <div class="spin"></div>
    <p style="color:var(--muted); font-size:.9rem;">Running AI pipeline…</p>
  </div>

  <!-- Results -->
  <div id="results-section">
    <!-- Stats -->
    <div class="card">
      <h2>Summary</h2>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Visualisation + Groups -->
    <div class="card">
      <h2>Annotated Output &amp; Brand Groups</h2>
      <div class="two-col">
        <div>
          <img id="vis-img" alt="Annotated result"/>
          <div style="margin-top:8px;">
            <a id="download-link" class="btn" style="text-decoration:none; font-size:0.82rem; padding:7px 14px;">
              ⬇ Download
            </a>
          </div>
        </div>
        <div>
          <ul id="groups-legend"></ul>
        </div>
      </div>
    </div>

    <!-- Raw JSON -->
    <div class="card">
      <h2>Raw JSON Response</h2>
      <pre id="json-block"></pre>
    </div>
  </div>

</main>

<script>
let selectedFile = null;

// Drag-and-drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-section').style.display = 'block';
  };
  reader.readAsDataURL(file);
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('error-box').innerHTML = '';
}

function reset() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('error-box').innerHTML = '';
}

async function analyze() {
  if (!selectedFile) return;

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('error-box').innerHTML = '';

  const fd = new FormData();
  fd.append('image', selectedFile);

  try {
    const resp = await fetch('/analyze', { method: 'POST', body: fd });
    const data = await resp.json();

    if (!resp.ok) {
      showError(data.error || 'Server error');
      return;
    }
    renderResults(data);
  } catch (err) {
    showError('Network error: ' + err.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('spinner').style.display = 'none';
  }
}

function renderResults(data) {
  // Stats
  const sg = document.getElementById('stats-grid');
  sg.innerHTML = `
    <div class="stat-card"><div class="val">${data.total_detections}</div><div class="lbl">Products Detected</div></div>
    <div class="stat-card"><div class="val">${data.total_groups}</div><div class="lbl">Brand Groups</div></div>
    <div class="stat-card"><div class="val">${data.processing_time_ms}</div><div class="lbl">Total ms</div></div>
    <div class="stat-card"><div class="val">${data.request_id}</div><div class="lbl">Request ID</div></div>
  `;

  // Visualisation
  if (data.visualization_b64) {
    const src = 'data:image/jpeg;base64,' + data.visualization_b64;
    document.getElementById('vis-img').src = src;
    const dl = document.getElementById('download-link');
    dl.href = src;
    dl.download = `result_${data.request_id}.jpg`;
  }

  // Groups legend
  const legend = document.getElementById('groups-legend');
  legend.innerHTML = '';
  for (const [gid, info] of Object.entries(data.groups || {})) {
    const [r, g, b] = info.color;
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="legend-swatch" style="background:rgb(${r},${g},${b})"></div>
      <span><strong>${gid}</strong> – ${info.count} product(s)</span>
    `;
    legend.appendChild(li);
  }

  // JSON
  const sanitised = { ...data };
  delete sanitised.visualization_b64;  // omit huge base64 from display
  document.getElementById('json-block').textContent =
    JSON.stringify(sanitised, null, 2);

  document.getElementById('results-section').style.display = 'block';
}

function showError(msg) {
  document.getElementById('error-box').innerHTML =
    `<div class="error-msg">⚠ ${msg}</div>`;
}
</script>
</body>
</html>
